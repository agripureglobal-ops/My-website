<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Our Trade Desk | Agripure Global</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --p: #1b4332; --a: #c5a059; --d: #141d18; --l: #f9fbf7; --w: #fff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { color: #333; line-height: 1.6; background: var(--l); }

        header { padding: 15px 5%; display: flex; flex-direction: column; align-items: center; box-shadow: 0 2px 15px rgba(0,0,0,0.05); position: sticky; top: 0; background: var(--w); z-index: 1000; }
        .logo-img { height: 50px; margin-bottom: 8px; }
        nav a { text-decoration: none; color: var(--p); font-weight: 700; text-transform: uppercase; font-size: 11px; letter-spacing: 1.5px; margin: 0 15px; }

        .contact-hero { background: var(--p); color: var(--w); padding: 60px 5%; text-align: center; border-bottom: 5px solid var(--a); }
        .contact-hero h1 { font-size: 2.2rem; text-transform: uppercase; font-weight: 900; }

        .contact-container { max-width: 1100px; margin: 40px auto; padding: 0 5%; display: grid; grid-template-columns: 1fr 1.5fr; gap: 30px; }

        .info-pane { background: var(--d); color: var(--w); padding: 40px; border-bottom: 4px solid var(--a); display: flex; flex-direction: column; justify-content: space-between; }
        .info-group h3 { color: var(--a); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; }

        .form-card { background: var(--w); padding: 40px; box-shadow: 0 15px 40px rgba(0,0,0,0.05); border-bottom: 4px solid var(--a); }
        .form-group { margin-bottom: 25px; position: relative; }
        label { display: block; margin-bottom: 10px; font-weight: 900; color: var(--p); text-transform: uppercase; font-size: 0.75rem; }

        /* SMART SEARCH BOX */
        .search-container { position: relative; width: 100%; }
        .search-input { width: 100%; padding: 15px; border: 1px solid #eee; background: #fbfbfb; font-size: 15px; outline: none; }
        .search-input:focus { border-color: var(--a); }
        
        .search-results { 
            position: absolute; top: 100%; left: 0; right: 0; 
            background: #fff; border: 1px solid #eee; border-top: none;
            max-height: 200px; overflow-y: auto; z-index: 10; display: none;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .result-item { padding: 12px 15px; cursor: pointer; font-size: 0.9rem; border-bottom: 1px solid #f9f9f9; }
        .result-item:hover { background: var(--l); color: var(--p); font-weight: 700; }
        .result-item span { font-size: 0.7rem; color: var(--a); float: right; text-transform: uppercase; }

        input[type="text"], input[type="email"], textarea { width: 100%; padding: 15px; border: 1px solid #eee; background: #fbfbfb; font-size: 15px; outline: none; }
        
        .btn-submit { width: 100%; padding: 18px; background: var(--p); color: white; border: none; font-weight: 900; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; }
        .btn-submit:hover { background: var(--a); }

        @media (max-width: 800px) { .contact-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header>
    <img src="logo.jpg" alt="Agripure Global" class="logo-img">
    <nav><a href="index.html">Home</a> <a href="story.html">Story</a> <a href="index.html#catalogue">Catalogue</a> <a href="contact.html" style="color:var(--a)">Contact</a></nav>
</header>

<section class="contact-hero">
    <h1>Trade Inquiry</h1>
    <p>Direct Sourcing Desk</p>
</section>

<div class="contact-container">
    <div class="info-pane">
        <div class="info-group">
            <h3>Trade Line</h3>
            <p><a href="https://wa.me/917666170693" style="color:#fff; text-decoration:none;"><i class="fab fa-whatsapp"></i> +91 7666170693</a></p>
        </div>
        <div class="info-group">
            <h3>Email</h3>
            <p>info@agripureglobal.com</p>
        </div>
        <p style="font-size: 0.7rem; color: var(--a); font-weight: 800; text-transform: uppercase;">7+ Years Integrity</p>
    </div>

    <section class="form-card">
        <form id="trade-form" action="https://formspree.io/f/mykdelle" method="POST">
            <div class="form-group">
                <label>What are you looking for?</label>
                <div class="search-container">
                    <input type="text" id="product-search" class="search-input" placeholder="Start typing... (e.g. Grapes, Onion, Makhana)" autocomplete="off">
                    <div id="results-box" class="search-results"></div>
                </div>
                <input type="hidden" name="Product_Interest" id="final-product-value" required>
            </div>

            <div class="form-group" style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
                <div><label>Name</label><input type="text" name="name" required></div>
                <div><label>Email</label><input type="email" name="email" required></div>
            </div>

            <div class="form-group">
                <label>Message / Requirements</label>
                <textarea name="message" rows="3" placeholder="Tonnage, Destination Port..." required></textarea>
            </div>

            <button type="submit" class="btn-submit">Dispatch Inquiry</button>
        </form>
    </section>
</div>

<script>
    // The "Growing" Product Database
    const products = [
        { name: "Export Grapes", cat: "Suite 02" },
        { name: "Pomegranates", cat: "Suite 02" },
        { name: "Banana", cat: "Suite 02" },
        { name: "Guava", cat: "Suite 02" },
        { name: "Papaya", cat: "Suite 02" },
        { name: "Red Onions", cat: "Suite 03" },
        { name: "Tomato", cat: "Suite 03" },
        { name: "Okra", cat: "Suite 03" },
        { name: "Green Chilli", cat: "Suite 03" },
        { name: "Gourds (Bottle/Bitter/Ridge)", cat: "Suite 03" },
        { name: "Cabbage", cat: "Suite 03" },
        { name: "Cauliflower", cat: "Suite 03" },
        { name: "Capsicum", cat: "Suite 03" },
        { name: "Baby Potato", cat: "Suite 03" },
        { name: "Onion Powder", cat: "Suite 04" },
        { name: "Premium Makhana", cat: "Suite 05" },
        { name: "Jaggery Blocks", cat: "Suite 01" }
    ];

    const searchInput = document.getElementById('product-search');
    const resultsBox = document.getElementById('results-box');
    const hiddenInput = document.getElementById('final-product-value');

    searchInput.addEventListener('input', function() {
        const val = this.value.toLowerCase();
        resultsBox.innerHTML = '';
        if (val.length < 1) { resultsBox.style.display = 'none'; return; }

        const filtered = products.filter(p => p.name.toLowerCase().includes(val));
        
        if (filtered.length > 0) {
            resultsBox.style.display = 'block';
            filtered.forEach(p => {
                const div = document.createElement('div');
                div.className = 'result-item';
                div.innerHTML = `${p.name} <span>${p.cat}</span>`;
                div.onclick = function() {
                    searchInput.value = p.name;
                    hiddenInput.value = p.name;
                    resultsBox.style.display = 'none';
                };
                resultsBox.appendChild(div);
            });
        } else {
            resultsBox.style.display = 'none';
        }
    });

    // Close results if clicking outside
    document.addEventListener('click', (e) => {
        if (!e.target.closest('.search-container')) resultsBox.style.display = 'none';
    });
</script>
</body>
</html>
