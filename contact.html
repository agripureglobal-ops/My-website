<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Agripure Global</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1b4332; --accent: #c5a059; --bg: #fdf6e9; --white: #ffffff; }
        body { font-family: 'Inter', sans-serif; margin: 0; background-color: var(--bg); color: var(--primary); line-height: 1.6; }

        /* HEADER (Synced with Index) */
        header { background: var(--white); padding: 15px 8%; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 20px rgba(0,0,0,0.05); }
        .logo-link { display: flex; align-items: center; gap: 15px; text-decoration: none; }
        .logo-img { height: 70px; }
        .brand-name { font-size: 1.2rem; font-weight: 800; color: var(--primary); text-transform: uppercase; }

        /* CONTACT FORM CONTAINER */
        .contact-container { max-width: 600px; margin: 80px auto; padding: 40px; background: var(--white); border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); }
        h2 { text-align: center; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 2px; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 700; margin-bottom: 8px; font-size: 13px; text-transform: uppercase; }
        input, textarea { width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; transition: 0.3s; }
        input:focus, textarea:focus { border-color: var(--accent); outline: none; }

        /* BUTTON STYLE */
        .send-btn { 
            background: #e65100; color: white; border: 2px solid #0d47a1; 
            padding: 15px 50px; border-radius: 50px; font-weight: 800; 
            cursor: pointer; font-size: 18px; text-transform: uppercase; transition: 0.3s;
        }
        .send-btn:hover { transform: scale(1.05); background: #f57c00; }

        /* SUCCESS MESSAGE STYLE */
        #success-message { 
            display: none; margin-top: 30px; padding: 25px; 
            border: 2px solid #2e7d32; background: #f1f8e9; 
            color: #1b5e20; border-radius: 4px; font-weight: 500;
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo-link">
        <img src="logo.jpg" alt="Logo" class="logo-img">
        <span class="brand-name">Agripure Global</span>
    </a>
</header>

<div class="contact-container">
    <div id="form-wrapper">
        <h2>Get a Trade Quote</h2>
        <form id="contactForm">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" placeholder="Enter your name" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="email@company.com" required>
            </div>
            <div class="form-group">
                <label>Product of Interest</label>
                <input type="text" id="productField" placeholder="e.g. Jaggery Blocks">
            </div>
            <div class="form-group">
                <label>Message</label>
                <textarea rows="5" placeholder="Tell us about your requirements..."></textarea>
            </div>
            <button type="submit" class="send-btn">SEND</button>
        </form>
    </div>

    <div id="success-message">
        Thank you for your message. It has been sent.
    </div>
</div>

<script>
    // 1. Logic to auto-fill product from the URL (if coming from index)
    const urlParams = new URLSearchParams(window.location.search);
    const product = urlParams.get('product');
    if (product) { document.getElementById('productField').value = product; }

    // 2. Logic to handle the "Send" click and show success
    document.getElementById('contactForm').addEventListener('submit', function(e) {
        e.preventDefault();
        document.getElementById('form-wrapper').style.display = 'none';
        document.getElementById('success-message').style.display = 'block';
    });
</script>

</body>
</html>
